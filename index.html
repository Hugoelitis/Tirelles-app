<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commandes Tirelles</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f8f7f4;color:#1a1a1a;min-height:100vh;padding:2rem}
.app{max-width:760px;margin:0 auto}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.sub{font-size:14px;color:#666;margin-bottom:1.5rem}
label{font-size:13px;color:#555;display:block;margin-bottom:6px}
textarea{width:100%;min-height:200px;resize:vertical;font-size:14px;padding:12px;border:1px solid #ddd;border-radius:8px;background:#fff;font-family:inherit;line-height:1.6}
textarea:focus{outline:none;border-color:#888}
.actions{display:flex;gap:8px;margin:12px 0 1.5rem;align-items:center}
button{padding:8px 16px;border:1px solid #ccc;border-radius:8px;background:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px}
button:hover{background:#f0f0f0}
button.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
button.primary:hover{background:#333}
button:disabled{opacity:0.4;cursor:not-allowed}
.status{font-size:13px;color:#888}
.result{display:none;margin-top:1rem}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.result-header h2{font-size:15px;font-weight:600}
.result-btns{display:flex;gap:6px}
.warn{background:#fff8e1;border:1px solid #f0c040;border-radius:8px;padding:12px 14px;margin-bottom:12px;display:none}
.warn h3{font-size:13px;font-weight:600;color:#8a6500;margin-bottom:6px}
.warn ul{font-size:13px;color:#8a6500;padding-left:16px}
.wrap{border:1px solid #e0e0e0;border-radius:10px;overflow:hidden;background:#fff}
table{width:100%;border-collapse:collapse;font-size:14px}
th{text-align:left;padding:8px 12px;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.04em;background:#fafafa;border-bottom:1px solid #e0e0e0}
td{padding:8px 12px;border-bottom:1px solid #f0f0f0;color:#1a1a1a}
tr:last-child td{border-bottom:none}
.mono{font-family:monospace;font-size:13px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:12px}
.ok{background:#e8f5e9;color:#2e7d32}
.warn-badge{background:#fff8e1;color:#8a6500}
.na-badge{background:#e3f2fd;color:#1565c0}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #ccc;border-top-color:#333;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <h1>Commandes tirelles</h1>
  <p class="sub">Collez un mail de commande — références, désignations, full range — l'outil normalise et exporte le CSV.</p>
  <div>
    <label for="mail">Contenu du mail</label>
    <textarea id="mail" placeholder="Collez ici le texte du mail..."></textarea>
  </div>
  <div class="actions">
    <button class="primary" id="btn" onclick="run()">Traiter la commande</button>
    <button onclick="clearAll()">Effacer</button>
    <span class="status" id="status"></span>
  </div>
  <div class="result" id="result">
    <div class="result-header">
      <h2 id="rtitle">Résultat</h2>
      <div class="result-btns">
        <button onclick="copyCSV()">Copier CSV</button>
        <button onclick="dlCSV()">Télécharger CSV</button>
      </div>
    </div>
    <div class="warn" id="warn"><h3>Références non reconnues</h3><ul id="wlist"></ul></div>
    <div class="wrap">
      <table>
        <thead><tr><th>Référence tirelle</th><th>Quantité</th><th>Source</th><th>Statut</th></tr></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

const PROD_MAP = {};
const TL_MAP = {};
const DESIG_MAP = {};
CATALOGUE.forEach(e => {
  PROD_MAP[e.p] = e;
  TL_MAP[e.t] = e;
  DESIG_MAP[e.d.toLowerCase()] = e;
});

function findByProd(ref) { return PROD_MAP[ref.toUpperCase()] || null; }
function findByTL(ref) { return TL_MAP[ref.toUpperCase()] || null; }
function findFullRange(fam, col) {
  const prefix = fam.toUpperCase() + '_' + col + '_';
  return CATALOGUE.filter(e => e.p.startsWith(prefix));
}

const FAMILIES = ['CHAN','CMO','CN','COLLE','CW','DEC2','DEC','DM','FST','FR','FS','GA','GL','GM','JA','JU','LA','LB','LC','LF','LI','LM','LP','LR','LT','LV','LW','LX','LY','LZ','OD','PA','PAN','PP','PR','RM','RP','SE','TP','TV','VP','WO','CH','CV','DE','DI'];

const SYSTEM = `Tu es un assistant qui extrait des commandes de tirelles (échantillons textiles) depuis des mails.

CATALOGUE : tu n'as PAS accès au catalogue directement. Tu dois identifier dans le mail :
1. Les références produit directes (ex: RM_410_09, LI_923_07, CMO_WCA_02_15)
2. Les désignations texte (ex: "Anguille HPC Rubans de brumes", "EXCALIBUR Métal frappé")
3. Les demandes "full range" d'une gamme (ex: "tous les coloris LI 923", "full range RM 410", "gamme complète CV 105")

Familles valides : ${FAMILIES.join(', ')}

Règles de normalisation :
- Format : TL_XX_NNN_CC (coloris toujours 2 chiffres : 3→03)  
- CMO : supprimer le segment série → CMO_WCA_02_15 → TL_CMO_02_15
- Si TL_ déjà présent : garder tel quel

RÉPONDRE UNIQUEMENT en JSON valide, zéro texte avant/après :
{
  "items": [
    {"type": "ref", "raw": "RM_410_09", "ref_norm": "RM_410_09", "quantite": 2},
    {"type": "desig", "raw": "Anguille HPC Rubans de brumes", "desig_search": "ABCG - ANGUILLE HPC Rubans de brumes", "quantite": 1},
    {"type": "fullrange", "raw": "full range LI 923", "famille": "LI", "collection": "923", "quantite": 1}
  ]
}

Pour type "ref" : ref_norm = référence produit normalisée sans TL_ (ex: RM_410_09)
Pour type "desig" : desig_search = désignation la plus complète possible pour la recherche
Pour type "fullrange" : famille + collection extraites
quantite = 1 si non précisé`;

let lastRows = [];

async function run() {
  const mail = document.getElementById('mail').value.trim();
  if (!mail) { setStatus('Collez un mail.'); return; }
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Traitement...';
  setStatus('');
  document.getElementById('result').style.display = 'none';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        system: SYSTEM,
        messages: [{ role: 'user', content: mail }]
      })
    });
    const data = await res.json();
    const text = data.content.map(b => b.text||'').join('');
    const match = text.match(/\{[\s\S]*\}/);
    if (!match) throw new Error('Aucun JSON trouvé dans la réponse');
    const parsed = JSON.parse(match[0]);
    
    const rows = [];
    for (const item of parsed.items || []) {
      if (item.type === 'ref') {
        const entry = findByProd(item.ref_norm) || findByTL('TL_' + item.ref_norm);
        if (entry) {
          rows.push({ref: entry.t, qty: item.quantite||1, source: 'Référence', status: 'ok', na: entry.na});
        } else {
          rows.push({ref: item.ref_norm, qty: item.quantite||1, source: 'Référence', status: 'inconnu', na: false});
        }
      } else if (item.type === 'desig') {
        const search = (item.desig_search||item.raw).toLowerCase();
        let found = null;
        for (const [k, e] of Object.entries(DESIG_MAP)) {
          if (k.includes(search) || search.includes(k)) { found = e; break; }
        }
        if (!found) {
          const words = search.split(' ').filter(w => w.length > 3);
          let best = null, bestScore = 0;
          for (const [k, e] of Object.entries(DESIG_MAP)) {
            const score = words.filter(w => k.includes(w)).length;
            if (score > bestScore) { bestScore = score; best = e; }
          }
          if (bestScore >= 2) found = best;
        }
        if (found) {
          rows.push({ref: found.t, qty: item.quantite||1, source: 'Désignation', status: 'ok', na: found.na});
        } else {
          rows.push({ref: item.raw, qty: item.quantite||1, source: 'Désignation', status: 'inconnu', na: false});
        }
      } else if (item.type === 'fullrange') {
        const matches = findFullRange(item.famille, item.collection);
        if (matches.length > 0) {
          matches.forEach(e => rows.push({ref: e.t, qty: item.quantite||1, source: 'Full range', status: 'ok', na: e.na}));
        } else {
          rows.push({ref: item.famille+'_'+item.collection+' (gamme)', qty: item.quantite||1, source: 'Full range', status: 'inconnu', na: false});
        }
      }
    }
    
    const merged = {};
    rows.forEach(r => {
      if (merged[r.ref]) { merged[r.ref].qty += r.qty; }
      else { merged[r.ref] = {...r}; }
    });
    const dedupRows = Object.values(merged);
    lastRows = dedupRows;
    render(dedupRows);
  } catch(e) {
    setStatus('Erreur lors du traitement. Réessayez.');
    console.error(e);
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Traiter la commande';
  }
}

function render(rows) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  const inconnus = rows.filter(r => r.status === 'inconnu');
  const warn = document.getElementById('warn');
  if (inconnus.length) {
    warn.style.display = 'block';
    document.getElementById('wlist').innerHTML = inconnus.map(r => `<li>${r.ref} — à vérifier manuellement</li>`).join('');
  } else { warn.style.display = 'none'; }

  rows.forEach(r => {
    const tr = document.createElement('tr');
    let statusBadge = r.status === 'ok'
      ? `<span class="badge ok">✓ Validé</span>`
      : `<span class="badge warn-badge">⚠ Inconnu</span>`;
    if (r.status === 'ok' && r.na) statusBadge += ' <span class="badge na-badge">NA</span>';
    tr.innerHTML = `<td class="mono">${r.ref}</td><td>${r.qty}</td><td><span style="font-size:12px;color:#888">${r.source}</span></td><td>${statusBadge}</td>`;
    tbody.appendChild(tr);
  });

  const ok = rows.filter(r => r.status === 'ok').length;
  document.getElementById('rtitle').textContent = `${rows.length} article${rows.length>1?'s':''} (${ok} validé${ok>1?'s':''})`;
  document.getElementById('result').style.display = 'block';
}

function buildCSV() {
  return ['Références,Quantités', ...lastRows.map(r => `${r.ref},${r.qty}`)].join('\n');
}
function copyCSV() { navigator.clipboard.writeText(buildCSV()).then(()=>setStatus('CSV copié !')); }
function dlCSV() {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([buildCSV()], {type:'text/csv;charset=utf-8;'}));
  a.download = 'commande_tirelles.csv'; a.click();
}
function clearAll() {
  document.getElementById('mail').value = '';
  document.getElementById('result').style.display = 'none';
  setStatus(''); lastRows = [];
}
function setStatus(m) { document.getElementById('status').textContent = m; }
</script>
</body>
</html>
